client:
  server: "vpn.example.com"
  port: 8443
  use_tls: false  # true для wss://, false для ws://
  ws_location: "/ws"  # WebSocket путь (должен совпадать с server.path)

auth:
  username: "user1"
  password: "password1111"
  timeout: 10  # таймаут аутентификации в секундах

proxy:
  enabled: false
  type: "http"  # http или socks
  address: "proxy.example.com"
  port: 3128
  username: ""
  password: ""

tun:
  name: "vpnclient0"
  ip: ""  # авто (получит от сервера)
  subnet: 0
  
#routes:
  # Эти маршруты имеют БОЛЬШИЙ ПРИОРИТЕТ чем серверные
#  - dst: "192.168.0.0/16"
#    gw: ""
#    metric: 50

connection_settings:
  keepalive_interval: 30    # интервал keepalive (секунды)
  keepalive_timeout: 90     # таймаут keepalive (секунды)
  fragment_timeout: 5       # таймаут фрагментации (секунды)
  reconnect:
    max_attempts: 0         # 0 = "вечно", >0 = N попыток
    delay: 5                # базовая задержка (секунды)
    delay_max: 60           # максимум задержки при exponential backoff
    exponential: true       # нарастающая задержка: 5, 10, 20, 40, 60...
  compression: false        # сжатие пакетов (должно совпадать с сервером)
